<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Fond dégradé doux -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a1f35"/>
    </linearGradient>
    <linearGradient id="headGrad" x1="160" y1="60" x2="240" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="heartGrad" x1="185" y1="130" x2="215" y2="165" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond -->
  <rect width="400" height="300" fill="url(#bg)" rx="16"/>

  <!-- Cercle de fond lumineux -->
  <circle cx="200" cy="140" r="90" fill="#4f46e5" opacity="0.08"/>
  <circle cx="200" cy="140" r="65" fill="#6366f1" opacity="0.07"/>

  <!-- Tête stylisée (silhouette) -->
  <ellipse cx="200" cy="105" rx="38" ry="42" fill="url(#headGrad)" opacity="0.9"/>

  <!-- Cou -->
  <rect x="188" y="144" width="24" height="18" rx="4" fill="url(#headGrad)" opacity="0.9"/>

  <!-- Corps (épaules) -->
  <path d="M148 195 Q148 162 172 158 L200 155 L228 158 Q252 162 252 195 Z" fill="url(#headGrad)" opacity="0.75"/>

  <!-- Cœur sur la poitrine -->
  <g filter="url(#glow)">
    <path d="M200 178 C200 178 188 168 188 161 C188 156 192 153 196 153 C198 153 200 155 200 155 C200 155 202 153 204 153 C208 153 212 156 212 161 C212 168 200 178 200 178 Z" fill="url(#heartGrad)"/>
  </g>

  <!-- Ligne EEG / onde cérébrale -->
  <polyline
    points="100,220 120,220 130,205 140,235 150,210 163,230 173,220 227,220 237,205 247,235 257,210 270,230 280,220 300,220"
    stroke="#6366f1"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    opacity="0.8"
    filter="url(#glow)"
  />

  <!-- Points décoratifs -->
  <circle cx="100" cy="220" r="3" fill="#6366f1" opacity="0.6"/>
  <circle cx="300" cy="220" r="3" fill="#6366f1" opacity="0.6"/>

  <!-- Petites étoiles / particules -->
  <circle cx="140" cy="80" r="2" fill="#a5b4fc" opacity="0.5"/>
  <circle cx="265" cy="95" r="1.5" fill="#a5b4fc" opacity="0.4"/>
  <circle cx="155" cy="230" r="1.5" fill="#f9a8d4" opacity="0.4"/>
  <circle cx="250" cy="240" r="2" fill="#f9a8d4" opacity="0.35"/>

  <!-- Texte Projet J -->
  <text x="200" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" letter-spacing="4" fill="#a5b4fc" opacity="0.9">PROJET J</text>
</svg>
